# code: language=sh
# C- for the control key
# M- for the meta key (normally Alt on modern computers)
# S- for the shift key

# tmux conf adapted from: https://linuxblog.io/tmux-the-complete-guide-to-terminal-multiplexing-on-linux/
# ref: https://github.com/majamin/dotfiles/blob/master/.config/tmux/tmux.conf

# change prefix from ctrl-b to `(backtick)
set -g prefix `
unbind C-b
bind ` send-prefix

# Use vi keys in copy mode
setw -g mode-keys vi

# 将连按的等待时间设置为 1 秒
set -g repeat-time 1000

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Enable mouse support
set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer
set -g history-limit 10000

# Faster key repetition
set -s escape-time 0

set -g default-terminal "screen-256color"

# Status bar tweaks
# set-option -g status-position top
# set -g status-interval 5
# set -g status-left "[#S] "
# set -g status-right " %H:%M %d-%b "
# set -g status-right-length 50

unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9

# reload tmux conf with `R`
unbind r
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

unbind %
bind "'" split-window -h
bind '"' split-window -v
bind -r o select-pane -t :.+
bind -r C-o rotate-window

# 在复制模式中，使用 v 开始选择，y 复制 (需配合系统剪贴板插件)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# use tmux-vim navigator
# bind -n M-h select-pane -L
# bind -n M-l select-pane -R
# bind -n M-k select-pane -U
# bind -n M-j select-pane -D

unbind c
unbind n
bind n new-window
unbind p

# 注意：原有的 , 是重命名窗口，. 是切换窗口索引，取消它们以防误触
unbind ,
unbind .
bind -r , previous-window
bind -r . next-window

bind r command-prompt -I "#W" "rename-window '%%'"

bind -r H resize-pane -L 5
bind -r L resize-pane -R 5

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
# set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

###########################################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# prefix + I : install plugins
# prefix + U : udpate plugins
# prefix + alt + u : remove plugins not on the list
