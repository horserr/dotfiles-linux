# code: language=sh

set -g prefix `
unbind C-b
bind ` send-prefix

unbind r
bind r source-file ~/.config/tmux/tmux.conf; display-message "Config reloaded.."

# Use Vim shortcuts
setw -g mode-keys vi

set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# 启用鼠标支持（可以直接拖拽分屏线、滚动查看日志）
set -g mouse on

# 在复制模式中，使用 v 开始选择，y 复制 (需配合系统剪贴板插件)
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# 快捷切换面板：使用 Prefix + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g default-terminal "screen-256color"

# 增加历史滚动行数（默认很小，改大一点方便查日志）
set -g history-limit 10000

# 窗口编号从 1 开始（默认从 0 开始，主键盘上 1 在左边更好按）
set -g base-index 1
setw -g pane-base-index 1

set-option -g status-position top

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

###########################################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# prefix + I : install plugins
# prefix + U : udpate plugins
# prefix + alt + u : remove plugins not on the list
